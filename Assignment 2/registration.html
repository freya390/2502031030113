{% extends "base.html" %}
{% block main-content %}
{% load static %}


    <!-- Breadcrumb Start -->
    <div class="container-fluid">
        <div class="row px-xl-5">
            <div class="col-12">
                <nav class="breadcrumb bg-light mb-30">
                    <a class="breadcrumb-item text-dark" href="/">Home</a>
                    <span class="breadcrumb-item active">registration here</span>
                </nav>
            </div>
        </div>
    </div>
    <!-- Breadcrumb End -->


    <!-- Contact Start -->
    <div class="container-fluid">
        <h2 class="section-title position-relative text-uppercase mx-xl-5 mb-4"><span class="bg-secondary pr-3">registration form</span></h2>
        <div class="row px-xl-5">
            <div class="col-lg-7 mb-5">
                <div class="contact-form bg-light p-30">
                    <div id="success"></div>
                    <form action="{% url 'registration' %}" method="post"  name="sentMessage" id="contactForm" novalidate="novalidate">
                        {%csrf_token%}
                        <div class="control-group">
                            <input type="text" name="fname" class="form-control" id="name" placeholder="Enter FIrstName"
                                required="required" data-validation-required-message="Please enter your name" />
                            <p class="help-block text-danger"></p>
                        </div>
                        <div class="control-group">
                            <input type="text" name="lname" class="form-control" id="name" placeholder="Enter LastName"
                                required="required" data-validation-required-message="Please enter your name" />
                            <p class="help-block text-danger"></p>
                        </div>
                        <div class="control-group">
                            <input type="email" name="email" class="form-control" id="email" placeholder="Enter Email ID"
                                required="required" data-validation-required-message="Please enter your email" />
                            <p class="help-block text-danger"></p>
                        </div>
                       
                        <div class="control-group">
                            <input type="text" name="uname" class="form-control" id="name" placeholder="Enter UserName"
                                required="required" data-validation-required-message="Please enter your name" />
                            <p class="help-block text-danger"></p>
                        </div>
                        
                         <div class="control-group">
                            <input type="password" name="pass1" class="form-control" id="name" placeholder="Enter Password"
                                required="required" data-validation-required-message="Please enter your name" />
                            <p class="help-block text-danger"></p>
                        </div>
                        <div class="control-group">
                            <input type="password" name="pass2" class="form-control" id="name" placeholder="Conform Password"
                                required="required" data-validation-required-message="Please enter your name" />
                            <p class="help-block text-danger"></p>
                        </div>
                        <div>
                            <center>
                            <button class="btn btn-primary py-2 px-4" type="submit" id="sendMessageButton">sign up</button>
                            </center>
                        </div>
                    </form>
                </div>
            </div>
            
        </div>
    </div>
    <!-- Contact End -->

    {% endblock main-content %}
